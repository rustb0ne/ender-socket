; PlatformIO Project Configuration File
;   IoT Smart Socket (ESP32)

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 115200
upload_flags =
    --before
    default_reset
    --after
    hard_reset

build_flags =
    ; ESP32 Dev Module (regular ESP32, no PSRAM)
    -DARDUINO_ESP32
    ; Display (ILI9341 via TFT_eSPI on shared SPI)
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_MISO=19
    -DTFT_CS=17
    -DTFT_DC=16
    -DTFT_RST=5
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=21
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    ; PZEM: remap Serial2 to GPIO26(RX) + GPIO25(TX)
    -DUSER_SERIAL2_RX=26
    -DUSER_SERIAL2_TX=25

lib_deps =
    ; Display
    bodmer/TFT_eSPI @ ^2.5.43
    ; PZEM power meter
    mandulaj/PZEM-004T-v30 @ ^1.1.2
    ; Temperature sensors
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^4.0.5
    ; Networking
    knolleary/PubSubClient @ ^2.8
    tzapu/WiFiManager @ ^2.0.17
    ; JSON
    bblanchon/ArduinoJson @ ^7.0.0
